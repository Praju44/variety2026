<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Variety Jewels offers premium stainless jewelry including necklaces, rings, bracelets and earrings. Elegant jewelry in Nepal.">

<style>
body { margin:0; font-family:'Segoe UI', sans-serif; background:#fff; color:#333; }
header { background:#fff; padding:20px; text-align:center; border-bottom:2px solid gold; }
header h1 { color:#b8860b; letter-spacing:2px; }
nav { background:#b8860b; text-align:center; padding:12px; }
nav a { color:white; text-decoration:none; margin:0 20px; font-weight:bold; }
nav a:hover { color:black; }
.hero { background: url('images/hero.jpg') center/cover no-repeat; padding:120px 20px; text-align:center; color:white; }
.hero h2 { font-size:40px; }
.hero button { background:gold; padding:12px 25px; border:none; font-weight:bold; cursor:pointer; border-radius:5px; margin-top:20px; }
.hero button:hover { background:black; color:white; }
.section { padding:60px 40px; text-align:center; }
.products { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:30px; margin-top:40px; }
.product { background:#fffdf7; border-radius:12px; box-shadow:0 5px 15px rgba(0,0,0,0.08); overflow:hidden; transition:0.3s; }
.product:hover { transform:translateY(-5px); }
.product img { width:100%; height:300px; object-fit:cover; }
.product-info { padding:20px; text-align:center; }
.product-info h3 { color:#b8860b; }
.price { font-size:18px; font-weight:bold; margin:10px 0; }
footer { background:#b8860b; color:white; text-align:center; padding:20px; }
</style>
</head>

<body>

<header>
<h1>Variety Jewels</h1>
<p>Premium Stainless Jewelry</p>
</header>

<nav>
<a href="index.html">Home</a>
<a href="product.html">Products</a>
<a href="about.html">About</a>
</nav>

<section class="hero">
<h2>Timeless Jewelry. Lasting Elegance.</h2>
<button onclick="location.href='product.html'">Shop Now</button>
</section>

<section class="section">
<h2 style="color:#b8860b;">Featured Collection</h2>

<div class="products">

<div class="product">
<img src="images/necklace.jpg" alt="Gold Necklace">
<div class="product-info">
<h3>Royal Gold Necklace</h3>
<p class="price">Rs 1500</p>
</div>
</div>

<div class="product">
<img src="images/ring.jpg" alt="Diamond Ring">
<div class="product-info">
<h3>Elegant Diamond Ring</h3>
<p class="price">Rs 1000</p>
</div>
</div>

<div class="product">
<img src="images/bracelet.jpg" alt="Gold Bracelet">
<div class="product-info">
<h3>Luxury Bracelet</h3>
<p class="price">Rs 1200</p>
</div>
</div>

<div class="product">
<img src="images/earrings.jpg" alt="Gold Earrings">
<div class="product-info">
<h3>Golden Drop Earrings</h3>
<p class="price">Rs 800</p>
</div>
</div>

</div>
</section>

<footer>
© 2026 Variety Jewels | All Rights Reserved
</footer>

</body>
</html>
